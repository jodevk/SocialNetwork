# Server
server.port=8080

# Database
spring.datasource.url=jdbc:h2:mem:socialdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
app.jwt.secret=${APP_JWT_SECRET:qJ2zX5vL8pR3tY7uI9oW1kN4mB6vC9xE2rT5yH8}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Logging
logging.level.ks.social.network=INFO
logging.level.org.hibernate=ERROR
